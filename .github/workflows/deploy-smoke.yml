name: deploy-smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      bootRunId:
        description: Company AGI boot run id
        required: true
        type: string
      workUnitId:
        description: Company AGI smoke work-unit id
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify smoke target
        run: |
          set -euo pipefail
          test -f README.md
          mkdir -p .company-agi/deploy-smoke
          {
            printf 'workflow=%s
' "${{ github.workflow }}"
            printf 'run_id=%s
' "${{ github.run_id }}"
            printf 'sha=%s
' "${{ github.sha }}"
            printf 'bootRunId=%s
' "${{ inputs.bootRunId }}"
            printf 'workUnitId=%s
' "${{ inputs.workUnitId }}"
          } > .company-agi/deploy-smoke/evidence.txt
      - uses: actions/upload-artifact@v4
        with:
          name: deploy-smoke-evidence
          path: .company-agi/deploy-smoke/evidence.txt
